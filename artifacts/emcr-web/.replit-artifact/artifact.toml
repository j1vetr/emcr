kind = "web"
previewPath = "/"
title = "EMCR Medikal"
version = "1.0.0"
id = "artifacts/emcr-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25353

[services.development]
run = "pnpm --filter @workspace/emcr-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/emcr-web", "run", "build" ]
publicDir = "artifacts/emcr-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25353"
BASE_PATH = "/"
